openapi: 3.0.0
info:
  title: Bookstore API
  version: 1.0.0
servers:
  - url: https://api.bookstore.example.com
paths:
  /books:
    get:
      operationId: listBooks
      summary: List all books
      responses:
        '200':
          description: A list of books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'

components:
  schemas:
    Book:
      type: object
      required:
        - id
        - title
      properties:
        id:
          type: integer
        title:
          type: string
