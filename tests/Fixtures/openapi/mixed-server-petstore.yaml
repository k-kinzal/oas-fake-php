openapi: 3.0.0
info:
  title: Mixed Server Petstore API
  version: 1.0.0
servers:
  - url: https://root.petstore.example.com
paths:
  /pets:
    servers:
      - url: https://api.path-petstore.example.com/v1
    get:
      operationId: listPets
      responses:
        '200':
          description: A list of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
  /orders:
    get:
      operationId: listOrders
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: integer
